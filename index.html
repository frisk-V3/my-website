<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ページを移動しています</title>
    <!-- CSSの読み込み -->
    <link rel="stylesheet" href="style.css">
    <!-- SEO対策：新サイトが正規であることを伝える -->
    <link rel="canonical" href="https://github.io">
    <!-- 万が一JSが動かない時のための予備転送 -->
    <meta http-equiv="refresh" content="3; URL='https://github.io'">
</head>
<body>
    <div class="redirect-container">
        <p>サイトを移転しました。自動的に移動します。</p>
        <p><a href="https://github.io">移動しない場合はこちらをクリックしてください</a></p>
    </div>

    <!-- JSの読み込み（最後に読み込む） -->
    <script src="script.js"></script>
</body>
</html>
